services:
  - type: web
    name: tripmind-ai-api
    runtime: node
    region: oregon
    plan: free

    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start

    healthCheckPath: /api/health

    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      - key: MONGODB_URI
        sync: false

      - key: CORS_ORIGIN
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false